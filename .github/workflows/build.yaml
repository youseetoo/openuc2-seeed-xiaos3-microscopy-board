name: Compile ESP32 Platformio (xiao led servo)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Updated to v4
      with:
        submodules: recursive
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio esptool
        
    - name: Install PlatformIO libraries
      run: pio lib install

    - name: Run PlatformIO Build
      run: pio run --environment seeed_xiao_esp32s3 -v
    
    - name: Merge into one binary
      run: |
        # Use the actual build directory
        cd .pio/build/seeed_xiao_esp32s3/
        python -m esptool --chip esp32s3 merge_bin \
          -o seeed_xiao_esp32s3_ledservo.bin \
          --flash_mode dio \
          --flash_freq 40m \
          --flash_size 4MB \
          0x0000 bootloader.bin \
          0x8000 partitions.bin \
          0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
          0x10000 firmware.bin

    - name: Check for merged firmware
      run: |
        # Corrected the path here to match the actual build folder
        if [ ! -f .pio/build/seeed_xiao_esp32s3/seeed_xiao_esp32s3_ledservo.bin ]; then
          echo "Merged firmware binary not found!"
          exit 1
        fi

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: merged-firmware
        path: .pio/build/seeed_xiao_esp32s3/seeed_xiao_esp32s3_ledservo.bin

    - name: Push to youseetoo Webtool
      uses: dmnemec/copy_file_to_another_repo_action@main
      env:
        API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
      with:
        source_file: '.pio/build/seeed_xiao_esp32s3/seeed_xiao_esp32s3_ledservo.bin'
        destination_repo: 'youseetoo/youseetoo.github.io'
        destination_folder: 'static/firmware_build'
        user_email: 'bene.d@gmx.de'
        user_name: 'beniroquai'
        commit_message: 'A new firmware binary has been released'